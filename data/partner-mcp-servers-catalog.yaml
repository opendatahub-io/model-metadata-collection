source: Partner MCP
mcp_servers:
    - name: confluentinc/mcp-confluent
      provider: Confluent
      license: Unknown
      license_link: ""
      description: Manage Confluent Cloud resources through the Confluent Cloud REST API. Provides cluster management, environment management, connector operations, and billing cost visibility.
      version: 1.0.0
      transports:
        - stdio
        - http
        - sse
      logo: data:image/png;base64,
      documentationUrl: https://github.com/confluentinc/mcp-confluent
      repositoryUrl: https://github.com/confluentinc/mcp-confluent
      tools:
        - name: list-connectors
          description: List Kafka connectors
          accessType: read_only
          parameters: []
        - name: read-connector
          description: Read connector configuration
          accessType: read_only
          parameters: []
        - name: delete-connector
          description: Delete a Kafka connector
          accessType: read_write
          parameters: []
        - name: list-clusters
          description: List Confluent Cloud clusters
          accessType: read_only
          parameters: []
        - name: list-environments
          description: List Confluent Cloud environments
          accessType: read_only
          parameters: []
        - name: read-environment
          description: Read environment details
          accessType: read_only
          parameters: []
        - name: list-billing-costs
          description: List billing costs for Confluent Cloud
          accessType: read_only
          parameters: []
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-confluentinc-mcp-confluent:1773859835
      runtimeMetadata:
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 256Mi
            recommended:
                cpu: 500m
                memory: 512Mi
        requiredEnvironmentVariables:
            - description: Master API key for Confluent Cloud
              name: CONFLUENT_CLOUD_API_KEY
              required: true
              type: secret
            - description: Master API secret for Confluent Cloud
              name: CONFLUENT_CLOUD_API_SECRET
              required: true
              type: secret
            - description: API key for HTTP/SSE authentication. Generate using --generate-key. Required when auth is enabled.
              name: MCP_API_KEY
              type: secret
            - description: Comma-separated list of allowed Host header values for DNS rebinding protection.
              name: MCP_ALLOWED_HOSTS
              required: true
              type: secret
            - description: Host to bind for HTTP transport. Defaults to localhost only for security.
              name: HTTP_HOST
              required: true
              type: secret
            - description: HTTP port for the server
              name: HTTP_PORT
              required: true
              type: config
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
    - name: dynatrace-oss/dynatrace-mcp
      provider: Dynatrace
      license: MIT
      license_link: ""
      description: AI Assistants can interact with the Dynatrace observability platform, bringing real-time observability data directly into your development workflow. Query logs, events, spans, metrics via DQL.
      version: 1.4.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://www.dynatrace.com/hub/detail/dynatrace-mcp-server/
      repositoryUrl: https://github.com/dynatrace-oss/dynatrace-mcp
      tools:
        - name: execute_dql
          description: Query Dynatrace using natural language or DQL (Dynatrace Query Language) statements; retrieves logs, events, spans, and metrics
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: DQL query or natural language description of data to retrieve
              required: true
        - name: list_problems
          description: Identify service issues from monitored infrastructure
          accessType: read_only
          parameters:
            - name: timeframe
              type: string
              description: Time range for problem search
              required: false
            - name: status
              type: string
              description: Filter by problem status
              required: false
        - name: send_event
          description: Transmit custom event data to Dynatrace for ingestion
          accessType: execute
          parameters:
            - name: event
              type: object
              description: Event data to send to Dynatrace
              required: true
        - name: get_environment_info
          description: Retrieve Dynatrace environment information
          accessType: read_only
          parameters: []
        - name: list_vulnerabilities
          description: List security vulnerabilities detected by Dynatrace
          accessType: read_only
          parameters: []
        - name: find_entity_by_name
          description: Find entities by name in Dynatrace
          accessType: read_only
          parameters: []
        - name: send_slack_message
          description: Send notification message to Slack
          accessType: execute
          parameters: []
        - name: verify_dql
          description: Verify DQL query syntax
          accessType: read_only
          parameters: []
        - name: generate_dql_from_natural_language
          description: Generate DQL query from natural language description
          accessType: read_only
          parameters: []
        - name: explain_dql_in_natural_language
          description: Explain DQL query in natural language
          accessType: read_only
          parameters: []
        - name: chat_with_davis_copilot
          description: Interact with Davis AI Copilot
          accessType: read_only
          parameters: []
        - name: create_workflow_for_notification
          description: Create Dynatrace workflow for notifications
          accessType: read_write
          parameters: []
        - name: make_workflow_public
          description: Make Dynatrace workflow public
          accessType: read_write
          parameters: []
        - name: get_kubernetes_events
          description: Retrieve Kubernetes events from Dynatrace
          accessType: read_only
          parameters: []
        - name: reset_grail_budget
          description: Reset Grail budget limits
          accessType: execute
          parameters: []
        - name: send_email
          description: Send email notification
          accessType: execute
          parameters: []
        - name: list_exceptions
          description: List exceptions detected by Dynatrace
          accessType: read_only
          parameters: []
        - name: list_davis_analyzers
          description: List available Davis analyzers
          accessType: read_only
          parameters: []
        - name: execute_davis_analyzer
          description: Execute Davis analyzer for root cause analysis
          accessType: execute
          parameters: []
        - name: create_dynatrace_notebook
          description: Create new Dynatrace notebook
          accessType: read_write
          parameters: []
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-dynatrace-oss-mcp:1773859835
      runtimeMetadata:
        defaultArgs:
            - node
            - dist/index.js
            - --http
            - --port
            - "3000"
            - --host
            - 0.0.0.0
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 128Mi
            recommended:
                cpu: 250m
                memory: 256Mi
        requiredEnvironmentVariables:
            - description: Dynatrace Platform URL
              name: DT_ENVIRONMENT
              required: true
              type: config
            - description: Dynatrace Platform API token
              name: DT_PLATFORM_TOKEN
              required: false
              type: secret
            - description: OAuth client ID for Dynatrace authentication
              name: OAUTH_CLIENT_ID
              required: false
              type: secret
            - description: OAuth client secret for Dynatrace authentication
              name: OAUTH_CLIENT_SECRET
              required: false
              type: secret
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
    - name: hashicorp/terraform-mcp-server
      provider: HashiCorp
      license: MPL-2.0
      license_link: ""
      description: 'Gain real-time access to current Terraform provider documentation, modules, and policies from the Terraform registry. v Supports HCP Terraform and Terraform Enterprise workspace management. NOTE: Beta software - do not use in production environments.'
      version: 0.4.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://developer.hashicorp.com/terraform/docs/tools/mcp-server
      repositoryUrl: https://github.com/hashicorp/terraform-mcp-server
      tools:
        - name: search_providers
          description: Search for Terraform providers in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for providers
              required: true
        - name: get_provider_details
          description: Get details about a specific Terraform provider
          accessType: read_only
          parameters:
            - name: provider
              type: string
              description: Provider namespace/name
              required: true
        - name: search_modules
          description: Search for Terraform modules in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for modules
              required: true
        - name: get_module_details
          description: Get details about a specific Terraform module
          accessType: read_only
          parameters:
            - name: module
              type: string
              description: Module namespace/name/provider
              required: true
        - name: list_workspaces
          description: List workspaces in a Terraform organization
          accessType: read_only
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
        - name: create_workspace
          description: Create a new workspace in HCP Terraform/TFE
          accessType: read_write
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
            - name: name
              type: string
              description: Workspace name
              required: true
        - name: get_workspace_details
          description: Get details of a specific workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: list_runs
          description: List runs in a workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: create_run
          description: Create a new run in a workspace
          accessType: execute
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: search_policies
          description: Search for Sentinel policies in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for policies
              required: true
      artifacts:
        - uri: oci://quay.io/rhoai-partner-mcp/ubi10-hashicorp-terraform-mcp-server:1773859835
      runtimeMetadata:
        defaultArgs:
            - ./terraform-mcp-server
            - streamable-http
            - --transport-host
            - 0.0.0.0
            - --transport-port
            - "8080"
            - --mcp-endpoint
            - /mcp
        defaultPort: 8080
        optionalEnvironmentVariables:
            - description: HCP Terraform/TFE API authentication token
              name: TFE_TOKEN
              required: false
              type: secret
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 128Mi
            recommended:
                cpu: 250m
                memory: 256Mi
        requiredEnvironmentVariables:
            - description: Transport protocol mode
              name: TRANSPORT_MODE
              required: true
              type: config
            - description: HTTP server bind address
              name: TRANSPORT_HOST
              required: true
              type: config
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
