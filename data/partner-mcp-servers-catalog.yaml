source: Partner MCP
mcp_servers:
    - name: dynatrace-oss/dynatrace-mcp
      provider: Dynatrace
      license: MIT
      license_link: ""
      description: AI Assistants can interact with the Dynatrace observability platform, bringing real-time observability data directly  into your development workflow. Query logs, events, spans, metrics via DQL.
      version: 1.4.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://www.dynatrace.com/hub/detail/dynatrace-mcp-server/
      repositoryUrl: https://github.com/dynatrace-oss/dynatrace-mcp
      tools:
        - name: execute_dql
          description: Query Dynatrace using natural language or DQL (Dynatrace Query Language) statements; retrieves logs, events, spans, and metrics
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: DQL query or natural language description of data to retrieve
              required: true
        - name: list_problems
          description: Identify service issues from monitored infrastructure
          accessType: read_only
          parameters:
            - name: timeframe
              type: string
              description: Time range for problem search
              required: false
            - name: status
              type: string
              description: Filter by problem status
              required: false
        - name: get_problem_details
          description: Deep-dive into specific problems with full context
          accessType: read_only
          parameters:
            - name: problem_id
              type: string
              description: ID of the problem to investigate
              required: true
        - name: list_security_problems
          description: Track vulnerabilities and security events
          accessType: read_only
          parameters: []
        - name: get_entity_details
          description: Retrieve comprehensive information about monitored services, hosts, and applications
          accessType: read_only
          parameters:
            - name: entity_id
              type: string
              description: ID of the entity to inspect
              required: true
        - name: send_event
          description: Transmit custom event data to Dynatrace for ingestion
          accessType: execute
          parameters:
            - name: event
              type: object
              description: Event data to send to Dynatrace
              required: true
        - name: list_documents
          description: Retrieve Notebooks, Dashboards, and Launchpads from Dynatrace
          accessType: read_only
          parameters: []
        - name: create_document
          description: Generate new documents in Dynatrace
          accessType: read_write
          parameters:
            - name: content
              type: object
              description: Document content to create
              required: true
      artifacts:
        - uri: oci://quay.io/mcp-servers/dynatrace-mcp:10-01-2025@sha256:f72c1d456fe9101d2742c17f6000a56e53976e45fb401ed817f38ef49056e1a9
      runtimeMetadata:
        defaultArgs:
            - --http
            - --port
            - "8585"
            - --host
            - 0.0.0.0
        defaultPort: 8585
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 128Mi
            recommended:
                cpu: 250m
                memory: 256Mi
        requiredEnvironmentVariables:
            - description: Dynatrace Platform URL
              name: DT_ENVIRONMENT
              required: true
              type: config
            - description: Dynatrace Platform API token
              name: DT_PLATFORM_TOKEN
              required: false
              type: secret
            - description: OAuth client ID for Dynatrace authentication
              name: OAUTH_CLIENT_ID
              required: false
              type: secret
            - description: OAuth client secret for Dynatrace authentication
              name: OAUTH_CLIENT_SECRET
              required: false
              type: secret
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
    - name: hashicorp/terraform-mcp-server
      provider: HashiCorp
      license: MPL-2.0
      license_link: ""
      description: 'Gain real-time access to current Terraform provider documentation, modules, and policies from the Terraform registry. v Supports HCP Terraform and Terraform Enterprise workspace management. NOTE: Beta software - do not use in production environments.'
      version: 0.4.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://developer.hashicorp.com/terraform/docs/tools/mcp-server
      repositoryUrl: https://github.com/hashicorp/terraform-mcp-server
      tools:
        - name: search_providers
          description: Search for Terraform providers in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for providers
              required: true
        - name: get_provider_details
          description: Get details about a specific Terraform provider
          accessType: read_only
          parameters:
            - name: provider
              type: string
              description: Provider namespace/name
              required: true
        - name: search_modules
          description: Search for Terraform modules in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for modules
              required: true
        - name: get_module_details
          description: Get details about a specific Terraform module
          accessType: read_only
          parameters:
            - name: module
              type: string
              description: Module namespace/name/provider
              required: true
        - name: list_workspaces
          description: List workspaces in a Terraform organization
          accessType: read_only
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
        - name: create_workspace
          description: Create a new workspace in HCP Terraform/TFE
          accessType: read_write
          parameters:
            - name: organization
              type: string
              description: Organization name
              required: true
            - name: name
              type: string
              description: Workspace name
              required: true
        - name: get_workspace_details
          description: Get details of a specific workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: list_runs
          description: List runs in a workspace
          accessType: read_only
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: create_run
          description: Create a new run in a workspace
          accessType: execute
          parameters:
            - name: workspace
              type: string
              description: Workspace name or ID
              required: true
        - name: search_policies
          description: Search for Sentinel policies in the registry
          accessType: read_only
          parameters:
            - name: query
              type: string
              description: Search query for policies
              required: true
      artifacts:
        - uri: oci://quay.io/mcp-servers/terraform-mcp-server:10-03-2025@sha256:3ee433bce1b3e5856d83e366dbb368ebdd8a73b39670152fd20d2d1506f0c937
      runtimeMetadata:
        defaultArgs:
            - streamable-http
        defaultPort: 8080
        optionalEnvironmentVariables:
            - description: HCP Terraform/TFE API authentication token
              name: TFE_TOKEN
              required: false
              type: secret
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 128Mi
            recommended:
                cpu: 250m
                memory: 256Mi
        requiredEnvironmentVariables:
            - description: Transport protocol mode
              name: TRANSPORT_MODE
              required: true
              type: config
            - description: HTTP server bind address
              name: TRANSPORT_HOST
              required: true
              type: config
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
    - name: mariadb/mcp
      provider: MariaDB
      license: MIT
      license_link: ""
      description: A standard interface for managing and querying MariaDB databases. Supports SQL operations, schema inspection, and optional vector/embedding-based semantic search. Includes comprehensive vector search capabilities with support for OpenAI, Gemini, and Hugging Face embeddings.
      version: 1.0.0
      transports:
        - stdio
        - http
        - sse
      logo: data:image/png;base64,
      documentationUrl: https://github.com/mariadb/mcp
      repositoryUrl: https://github.com/mariadb/mcp
      tools:
        - name: list_databases
          description: Enumerate all accessible databases on the MariaDB server
          accessType: read_only
          parameters: []
        - name: list_tables
          description: Show all tables in a specified database
          accessType: read_only
          parameters:
            - name: database
              type: string
              description: Database name to list tables from
              required: true
        - name: get_table_schema
          description: Retrieve column definitions, types, and keys for a table
          accessType: read_only
          parameters:
            - name: table
              type: string
              description: Table name to get schema for
              required: true
        - name: get_table_schema_with_relations
          description: Retrieve table schema including foreign key relationships
          accessType: read_only
          parameters:
            - name: table
              type: string
              description: Table name to get schema with relations for
              required: true
        - name: execute_sql
          description: Run SQL queries (read-only mode by default, controlled by MCP_READ_ONLY env var)
          accessType: read_write
          parameters:
            - name: query
              type: string
              description: SQL query to execute
              required: true
        - name: create_database
          description: Create a new database on the MariaDB server
          accessType: read_write
          parameters:
            - name: name
              type: string
              description: Name of the database to create
              required: true
        - name: create_vector_store
          description: Initialize embedding storage with configurable distance functions
          accessType: read_write
          parameters:
            - name: name
              type: string
              description: Name for the vector store
              required: true
        - name: delete_vector_store
          description: Remove a vector store table
          accessType: read_write
          parameters:
            - name: name
              type: string
              description: Name of the vector store to delete
              required: true
        - name: list_vector_stores
          description: Display all available vector stores
          accessType: read_only
          parameters: []
        - name: insert_docs_vector_store
          description: Batch insert documents with optional metadata into a vector store
          accessType: read_write
          parameters:
            - name: store_name
              type: string
              description: Target vector store name
              required: true
            - name: documents
              type: array
              description: Documents to insert with optional metadata
              required: true
        - name: search_vector_store
          description: Perform semantic similarity search across vector store documents
          accessType: read_only
          parameters:
            - name: store_name
              type: string
              description: Vector store to search
              required: true
            - name: query
              type: string
              description: Search query text
              required: true
      artifacts:
        - uri: oci://quay.io/mcp-servers/mariadb-mcp:10-3-2025@sha256:95c179d08dad661bfb8fc0f6959976f9ad3f90d70a8ccb831978958e58bca73e
      runtimeMetadata:
        defaultPort: 9001
        optionalEnvironmentVariables:
            - default: "3306"
              description: MariaDB server port
              name: DB_PORT
              type: config
            - default: "true"
              description: Enforce read-only mode for SQL queries
              name: MCP_READ_ONLY
              type: config
            - description: Embedding provider for vector operations (openai, gemini, huggingface)
              name: EMBEDDING_PROVIDER
              type: config
        recommendedResources:
            minimal:
                cpu: 250m
                memory: 512Mi
            recommended:
                cpu: 500m
                memory: 1Gi
        requiredEnvironmentVariables:
            - description: MariaDB server hostname
              name: DB_HOST
              required: true
              type: config
            - description: MariaDB username
              name: DB_USER
              required: true
              type: secret
            - description: MariaDB password
              name: DB_PASSWORD
              required: true
              type: secret
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
    - name: mongodb-js/mongodb-mcp-server
      provider: MongoDB
      license: Apache-2.0
      license_link: ""
      description: Interact with MongoDB databases and MongoDB Atlas. Provides database operations, Atlas cluster management, performance analysis, and query execution capabilities.
      version: 1.0.0
      transports:
        - stdio
        - http
      logo: data:image/png;base64,
      documentationUrl: https://www.mongodb.com/docs/mcp-server/get-started/
      repositoryUrl: https://github.com/mongodb-js/mongodb-mcp-server
      tools:
        - name: find
          description: Run a find query against a MongoDB collection
          accessType: read_only
          parameters: []
        - name: aggregate
          description: Run an aggregation against a MongoDB collection
          accessType: read_only
          parameters: []
        - name: insert-many
          description: Insert an array of documents into a MongoDB collection
          accessType: read_write
          parameters: []
        - name: update-many
          description: Updates all documents matching the specified filter
          accessType: read_write
          parameters: []
        - name: delete-many
          description: Removes all documents matching the filter from a collection
          accessType: read_write
          parameters: []
        - name: list-databases
          description: List all databases for a MongoDB connection
          accessType: read_only
          parameters: []
        - name: list-collections
          description: List all collections for a given database
          accessType: read_only
          parameters: []
        - name: collection-schema
          description: Describe the schema for a collection
          accessType: read_only
          parameters: []
        - name: collection-indexes
          description: Describe the indexes for a collection
          accessType: read_only
          parameters: []
        - name: create-index
          description: Create an index for a collection
          accessType: read_write
          parameters: []
        - name: atlas-list-clusters
          description: List MongoDB Atlas clusters
          accessType: read_only
          parameters: []
        - name: atlas-get-performance-advisor
          description: Retrieve performance suggestions including index recommendations and slow query logs
          accessType: read_only
          parameters: []
        - name: atlas-list-alerts
          description: List MongoDB Atlas alerts
          accessType: read_only
          parameters: []
      artifacts:
        - uri: oci://quay.io/mcp-servers/mongodb-mcp-server:10-01-2025@sha256:db0af62ed8a85eb694969c167031129cfec7c6e12ab59fbb79317e7702355079
      runtimeMetadata:
        defaultArgs:
            - --transport
            - http
            - --httpHost
            - 0.0.0.0
            - --httpPort
            - "9002"
            - --readOnly
        defaultPort: 9002
        optionalEnvironmentVariables:
            - description: MongoDB Atlas Service Account Client ID
              name: MDB_MCP_API_CLIENT_ID
              required: false
              type: secret
            - description: MongoDB Atlas Service Account Client Secret
              name: MDB_MCP_API_CLIENT_SECRET
              required: false
              type: secret
        recommendedResources:
            minimal:
                cpu: 100m
                memory: 256Mi
            recommended:
                cpu: 500m
                memory: 512Mi
        requiredEnvironmentVariables:
            - description: MongoDB connection URI
              name: MDB_MCP_CONNECTION_STRING
              required: true
              type: secret
      securityIndicators:
        readOnlyTools: false
        secureEndpoint: true
        verifiedSource: true
