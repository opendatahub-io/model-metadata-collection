name: enterprisedb/pg-airman-mcp
displayName: PG Airman MCP
provider: EnterpriseDB
version: 1.0.0
documentationUrl: https://github.com/EnterpriseDB/pg-airman-mcp
repositoryUrl: https://github.com/EnterpriseDB/pg-airman-mcp
license: Apache-2.0
description: >-
  Open-source Model Context Protocol server supporting AI agents throughout the complete PostgreSQL database development lifecycle—from initial coding through testing, deployment, and production tuning and maintenance
transports:
  - stdio
  - sse
  - http
deploymentMode: remote
toolCount: 10
artifacts:
  - uri: oci://quay.io/rhoai-partner-mcp/ubi10-enterprisedb-pg-airman-mcp:1775068164
tags:
  - database
  - postgresql
  - sql
  - query-optimization
  - index-tuning
  - database-health
  - schema-intelligence
  - oauth
securityIndicators:
  verifiedSource: true
  secureEndpoint: true
  sast: false
  readOnlyTools: true
tools:
  - name: list_schemas
    description: >-
      Lists all database schemas available in the PostgreSQL instance
    accessType: read_only
    parameters: []
  - name: list_objects
    description: >-
      Lists database objects (tables, views, sequences, extensions) within a specified schema
    accessType: read_only
    parameters:
      - name: schema
        type: string
        required: true
        description: >-
          Schema name to list objects from
  - name: get_object_details
    description: >-
      Provides information about a specific database object, including columns, constraints, and indexes
    accessType: read_only
    parameters:
      - name: object
        type: string
        required: true
        description: >-
          Fully qualified object identifier
  - name: execute_sql
    description: >-
      Executes SQL statements on the database with read-only limitations in restricted mode
    accessType: read_write
    parameters:
      - name: sql
        type: string
        required: true
        description: >-
          SQL statement to execute
  - name: explain_query
    description: >-
      Gets the execution plan for a SQL query describing how PostgreSQL will process it
    accessType: read_only
    parameters:
      - name: query
        type: string
        required: true
        description: >-
          SQL query to explain
      - name: hypothetical_indexes
        type: array
        required: false
        description: >-
          Optional list of hypothetical indexes to test
  - name: get_top_queries
    description: >-
      Reports the slowest SQL queries based on total execution time using pg_stat_statements data
    accessType: read_only
    parameters:
      - name: metric
        type: string
        required: false
        description: >-
          Execution time metric for ranking
  - name: analyze_workload_indexes
    description: >-
      Analyzes the database workload to identify resource-intensive queries and recommends optimal indexes
    accessType: read_only
    parameters:
      - name: workload_params
        type: object
        required: false
        description: >-
          Workload analysis parameters
  - name: analyze_query_indexes
    description: >-
      Analyzes a list of specific SQL queries (up to 10) and recommends optimal indexes
    accessType: read_only
    parameters:
      - name: queries
        type: array
        required: true
        description: >-
          List of SQL queries (max 10) to analyze
  - name: analyze_db_health
    description: >-
      Performs comprehensive health checks including buffer cache hit rates, connection health, constraint validation, index health, sequence limits, and vacuum health
    accessType: read_only
    parameters:
      - name: health_params
        type: object
        required: false
        description: >-
          Health check parameters
  - name: add_comment_to_object
    description: >-
      Adds a comment to a table, view, or column (allowed in restricted mode if ALLOW_COMMENT_IN_RESTRICTED=true)
    accessType: read_write
    parameters:
      - name: object_type
        type: string
        required: true
        description: >-
          Type of object (table, view, column)
      - name: object_identifier
        type: string
        required: true
        description: >-
          Fully qualified object identifier
      - name: comment
        type: string
        required: true
        description: >-
          Comment text to add
runtimeMetadata:
  defaultPort: 8001
  requiredEnvironmentVariables:
    - name: AIRMAN_MCP_DATABASE_URL
      description: >-
        PostgreSQL connection string (postgresql://user:pass@host:port/db)
      type: secret
      required: true
  optionalEnvironmentVariables:
    - name: AIRMAN_MCP_AUTH_ENABLED
      description: >-
        Enable OAuth 2.0 authentication (true/false)
      type: config
      required: false
    - name: AIRMAN_MCP_AUTH_SERVER_URL
      description: >-
        OAuth authorization server endpoint for token introspection
      type: config
      required: false
    - name: AIRMAN_MCP_AUTH_REQUIRED_SCOPES
      description: >-
        Required OAuth scopes for access
      type: config
      required: false
    - name: AIRMAN_MCP_AUTH_INTROSPECTION_CLIENT_ID
      description: >-
        OAuth client ID for token introspection
      type: config
      required: false
    - name: AIRMAN_MCP_AUTH_INTROSPECTION_CLIENT_SECRET
      description: >-
        OAuth client secret for token introspection
      type: secret
      required: false
    - name: AIRMAN_MCP_AUTH_VALIDATE_RESOURCE
      description: >-
        Enable RFC 8707 resource validation
      type: config
      required: false
    - name: AIRMAN_MCP_DNS_REBINDING_PROTECTION
      description: >-
        Enable DNS rebinding protection for reverse proxy deployments
      type: config
      required: false
    - name: AIRMAN_MCP_ALLOWED_HOSTS
      description: >-
        Comma-separated list of allowed Host header values
      type: config
      required: true
      default: "0.0.0.0"
    - name: AIRMAN_MCP_ALLOWED_ORIGINS
      description: >-
        Comma-separated list of allowed Origin header values
      type: config
      required: false
    - name: AIRMAN_MCP_TRANSPORT
      description: >-
        MCP transport: stdio, sse, or streamable-http
      type: config
      required: true
      default: "streamable-http"
    - name: AIRMAN_MCP_ACCESS_MODE
      description: >-
        SQL access mode: unrestricted or restricted
      type: config
      required: true
      default: "restricted"
    - name: ALLOW_COMMENT_IN_RESTRICTED
      description: >-
        Allow COMMENT ON statements in restricted mode
      type: config
      required: false
  recommendedResources:
    minimal:
      cpu: 100m
      memory: 256Mi
    recommended:
      cpu: 250m
      memory: 512Mi
