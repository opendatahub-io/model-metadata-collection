name: mongodb-js/mongodb-mcp-server
displayName: MongoDB MCP Server
provider: MongoDB
logo: data:image/png;base64,
version: 1.0.0
documentationUrl: https://www.mongodb.com/docs/mcp-server/get-started/
repositoryUrl: https://github.com/mongodb-js/mongodb-mcp-server
license: Apache-2.0
description: >-
  Interact with MongoDB databases and MongoDB Atlas. Provides database operations, Atlas cluster management, performance analysis,
  and query execution capabilities.
transports:
  - stdio
  - http
deploymentMode: local
toolCount: 15
artifacts:
  - uri: oci://quay.io/rhoai-partner-mcp/ubi10-mongodb-mcp-server:1774027206
tags:
  - mongodb
  - nosql
  - database
  - atlas
  - document-database
  - aggregation
  - query
securityIndicators:
  verifiedSource: true
  secureEndpoint: true
  readOnlyTools: false
tools:
  - name: find
    description: >-
      Run a find query against a MongoDB collection
    accessType: read_only
    parameters: [ ]
  - name: aggregate
    description: >-
      Run an aggregation against a MongoDB collection
    accessType: read_only
    parameters: [ ]
  - name: list-databases
    description: >-
      List all databases for a MongoDB connection
    accessType: read_only
    parameters: [ ]
  - name: list-collections
    description: >-
      List all collections for a given database
    accessType: read_only
    parameters: [ ]
  - name: collection-schema
    description: >-
      Describe the schema for a collection
    accessType: read_only
    parameters: [ ]
  - name: collection-indexes
    description: >-
      Describe the indexes for a collection
    accessType: read_only
    parameters: [ ]
  - name: collection-storage-size
    description: >-
      Get storage size information for a collection
    accessType: read_only
    parameters: [ ]
  - name: connect
    description: >-
      Establish connection to MongoDB instance
    accessType: read_only
    parameters: [ ]
  - name: count
    description: >-
      Count documents in a collection
    accessType: read_only
    parameters: [ ]
  - name: db-stats
    description: >-
      Retrieve database statistics
    accessType: read_only
    parameters: [ ]
  - name: explain
    description: >-
      Explain query execution plan
    accessType: read_only
    parameters: [ ]
  - name: export
    description: >-
      Export data from MongoDB collection
    accessType: read_only
    parameters: [ ]
  - name: mongodb-logs
    description: >-
      Retrieve MongoDB server logs
    accessType: read_only
    parameters: [ ]
  - name: list-knowledge-sources
    description: >-
      List available knowledge sources
    accessType: read_only
    parameters: [ ]
  - name: search-knowledge
    description: >-
      Search across knowledge sources
    accessType: read_only
    parameters: [ ]
runtimeMetadata:
  defaultPort: 9002
  defaultArgs:
    - "--transport"
    - "http"
    - "--httpHost"
    - "0.0.0.0"
    - "--httpPort"
    - "9002"
    - "--readOnly"
  requiredEnvironmentVariables:
    - name: MDB_MCP_CONNECTION_STRING
      description: >-
        MongoDB connection URI
      type: secret
      required: true
  optionalEnvironmentVariables:
    - name: MDB_MCP_API_CLIENT_ID
      description: >-
        MongoDB Atlas Service Account Client ID
      type: secret
      required: false
    - name: MDB_MCP_API_CLIENT_SECRET
      description: >-
        MongoDB Atlas Service Account Client Secret
      type: secret
      required: false
  recommendedResources:
    minimal:
      cpu: 100m
      memory: 256Mi
    recommended:
      cpu: 500m
      memory: 512Mi
